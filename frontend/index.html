<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – ResumeMS</title>
  <meta name="description" content="Login to your Resume Management System account."/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">📄</div>
      <h1>ResumeMS</h1>
      <p>Your career, managed professionally</p>
    </div>

    <div id="alert-box"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <button type="submit" id="login-btn" class="btn btn-primary btn-block btn-lg" style="margin-top:0.5rem">
        Sign In
      </button>
    </form>

    <p style="text-align:center; margin-top:1.5rem; font-size:0.875rem; color:var(--text-secondary)">
      Don't have an account?
      <a href="register.html" style="color:var(--accent-light);font-weight:600">Create one →</a>
    </p>

    <div style="margin-top:1.5rem; padding-top:1.25rem; border-top:1px solid var(--border)">
      <p style="font-size:0.78rem;color:var(--text-muted);text-align:center;margin-bottom:0.75rem">Demo accounts (password: <code style="color:var(--accent-light)">password123</code>)</p>
      <div style="display:flex;flex-direction:column;gap:0.4rem">
        <button class="btn btn-outline btn-sm" onclick="fillDemo('alice@example.com')">👩 Alice Johnson</button>
        <button class="btn btn-outline btn-sm" onclick="fillDemo('bob@example.com')">👨 Bob Smith</button>
        <button class="btn btn-outline btn-sm" onclick="fillDemo('charlie@example.com')">🧑 Charlie Kumar</button>
      </div>
    </div>
  </div>
</div>

<script src="js/common.js"></script>
<script src="js/auth.js"></script>
<script>
  function fillDemo(email) {
    document.getElementById('email').value = email;
    document.getElementById('password').value = 'password123';
  }
</script>
</body>
</html>
